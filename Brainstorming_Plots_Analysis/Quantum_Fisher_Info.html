<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QFI Cramér-Rao Bounds</title>
    <style>
        body { margin: 0; background-color: #111111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #plot-container { width: 90vw; height: 80vh; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { font-size: 22px; color: #cf6679; margin-bottom: 5px; }
        p { color: #aaa; margin-bottom: 20px; }
    </style>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
</head>
<body>

    <h1>Quantum Fisher Information Bounds</h1>
    <p>Macroscopic Crystal vs. Single NV Electron Sensitivity</p>

    <div id="plot-container"></div>

    <script>
        // Generate Logarithmic Grid Data
        const t_vals = [];
        const r_vals = [];
        for(let i=0; i<=6; i+=0.1) t_vals.push(Math.pow(10, i)); // 1 to 10^6 seconds
        for(let j=0; j<=10; j+=0.2) r_vals.push(j); // Spin squeezing 0 to 10

        const z_macro = [];
        const z_micro = [];
        const g_macro = 9.4e29;
        const g_micro = 8.5e-10;

        for(let r of r_vals) {
            let row_macro = [];
            let row_micro = [];
            for(let t of t_vals) {
                let h_macro = Math.log10(Math.exp(-r) / (g_macro * t));
                let h_micro = Math.log10(Math.exp(-r) / (g_micro * t));
                row_macro.push(h_macro);
                row_micro.push(h_micro);
            }
            z_macro.push(row_macro);
            z_micro.push(row_micro);
        }

        const trace1 = {
            z: z_macro, x: t_vals, y: r_vals,
            type: 'contour', colorscale: 'Viridis',
            xaxis: 'x1', yaxis: 'y1',
            contours: { showlabels: true, labelfont: { color: 'white' } },
            colorbar: { title: 'Log10(h_min)', x: 0.45, tickfont: {color: 'white'}, titlefont: {color: 'white'} }
        };

        const trace2 = {
            z: z_micro, x: t_vals, y: r_vals,
            type: 'contour', colorscale: 'Magma',
            xaxis: 'x2', yaxis: 'y2',
            contours: { showlabels: true, labelfont: { color: 'white' } },
            colorbar: { title: 'Log10(h_min)', x: 1.0, tickfont: {color: 'white'}, titlefont: {color: 'white'} }
        };

        const layout = {
            plot_bgcolor: '#111111', paper_bgcolor: '#111111',
            font: { color: '#ffffff' },
            grid: { rows: 1, columns: 2, pattern: 'independent' },
            xaxis: { type: 'log', title: 'Integration Time T (s)', gridcolor: '#333' },
            yaxis: { title: 'Squeezing Parameter r', gridcolor: '#333' },
            xaxis2: { type: 'log', title: 'Integration Time T (s)', gridcolor: '#333' },
            yaxis2: { gridcolor: '#333' },
            annotations: [
                { text: "Macroscopic Crystal (g ≈ 10²⁹)", x: 0.22, y: 1.05, xref: "paper", yref: "paper", showarrow: false, font: {size: 16} },
                { text: "Single NV Electron (g ≈ 10⁻¹⁰)", x: 0.78, y: 1.05, xref: "paper", yref: "paper", showarrow: false, font: {size: 16} }
            ]
        };

        Plotly.newPlot('plot-container', [trace1, trace2], layout, {responsive: true});
    </script>
</body>
</html>
