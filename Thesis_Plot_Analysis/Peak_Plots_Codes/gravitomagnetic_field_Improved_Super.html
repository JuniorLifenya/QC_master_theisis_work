<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravitomagnetic Field B̂_g — Absolute Interaction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap');
        * { margin:0; padding:0; box-sizing:border-box }
        body { background:#080810; color:#e0dcd6; font-family:'JetBrains Mono',monospace; overflow:hidden }
        
        #title-panel { 
            position:absolute; top:24px; left:24px; background:rgba(8,8,16,0.9);
            border:1px solid rgba(200,100,255,0.25); border-radius:3px; padding:20px 24px;
            max-width:420px; backdrop-filter:blur(14px); z-index:10 
        }
        #title-panel h1 { font-family:'Crimson Pro',serif; font-size:18px; font-weight:600; color:#c864ff; margin-bottom:6px }
        #title-panel p { font-size:10.5px; color:#8880a0; line-height:1.7; margin-bottom:10px }
        
        .eq { 
            font-size:11px; color:#d0a0ff; background:rgba(200,100,255,0.06);
            padding:8px 12px; border-radius:2px; border-left:2px solid rgba(200,100,255,0.4); margin-top:6px;
            font-family: 'Times New Roman', serif; font-style: italic;
        }

        #controls { 
            position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
            background:rgba(8,8,16,0.92); border:1px solid rgba(200,100,255,0.2);
            border-radius:3px; padding:14px 28px; backdrop-filter:blur(12px);
            display:flex; gap:24px; align-items:center; z-index:10 
        }
        .ctrl { display:flex; flex-direction:column; gap:5px; align-items:center }
        .ctrl label { font-size:10px; color:#7060a0; text-transform:uppercase; letter-spacing:0.05em }
        .val { font-size:11px; color:#c864ff; font-weight:600 }
        
        input[type=range] { -webkit-appearance:none; width:110px; height:3px; background:rgba(200,100,255,0.2); border-radius:2px; cursor:pointer; outline:none }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#c864ff; border-radius:50%; cursor:pointer }
        
        button { 
            background:rgba(200,100,255,0.1); border:1px solid rgba(200,100,255,0.3);
            color:#c864ff; padding:8px 16px; border-radius:2px; cursor:pointer; 
            font-family:inherit; font-size:10px; text-transform:uppercase; transition:all 0.2s 
        }
        button:hover { background:rgba(200,100,255,0.2) }
        button.active { background:rgba(200,100,255,0.3); border-color:#c864ff }

        #clegend { 
            position:absolute; top:24px; right:24px; background:rgba(8,8,16,0.88);
            border:1px solid rgba(200,100,255,0.2); border-radius:3px; padding:14px 18px; z-index:10 
        }
        #grad { 
            width:16px; height:120px; border-radius:2px;
            background:linear-gradient(to bottom, #ffee00, #ff6020, #aa20ff, #2060ff); margin:0 auto 6px 
        }
        .cleg-txt { font-size:9.5px; color:#8880a0; text-align: center; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="title-panel">
    <h1>Gravitomagnetic Field B̂<sub>g</sub></h1>
    <p>Horizontal propagation along <b>x</b>. The field couples to spin via the Zeeman-like Hamiltonian:</p>
    <div class="eq">Ĥ<sub>zeeman</sub> = (κβ / 4m) Σ̂ · B̂<sub>g</sub></div>
    <div class="eq">B̂<sub>g</sub> = ∇ × (h · p̂)</div>
</div>

<div id="clegend">
    <div id="grad"></div>
    <div class="cleg-txt">High</div>
    <div class="cleg-txt">Low</div>
</div>

<div id="controls">
    <div class="ctrl">
        <label>Wave Speed</label>
        <input type="range" id="speed" min="0" max="4.0" step="0.1" value="1.0">
        <div class="val" id="speed-val">1.0x</div>
    </div>
    <div class="ctrl">
        <label>Momentum (p)</label>
        <input type="range" id="momentum" min="0" max="6.0" step="0.1" value="2.5">
        <div class="val" id="mom-val">2.5</div>
    </div>
    <div class="ctrl">
        <label>Strain (h₀)</label>
        <input type="range" id="strain" min="0" max="2.0" step="0.1" value="1.0">
        <div class="val" id="strain-val">1.0</div>
    </div>
    <div class="ctrl">
        <label>Polarization</label>
        <div style="display:flex; gap:5px;">
            <button id="btn-plus" class="active">h₊</button>
            <button id="btn-cross">h×</button>
        </div>
    </div>
    <button id="pause-btn">Pause</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080810);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(16, 12, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(6, 0, 0); 
    controls.enableDamping = true;

    // --- State & Constants ---
    let time = 0, paused = false, speed = 1.0, p_val = 2.5, h0 = 1.0, isPlus = true;
    const w = 2.4, k = (2 * Math.PI) / 7.0;

    // --- Background Field Arrows ---
    const arrows = [];
    const RES_X = 18, RES_YZ = 10;
    const X_LEN = 14, YZ_RANGE = 4.0;

    for (let i = 0; i < RES_X; i++) {
        for (let j = 0; j < RES_YZ; l = 0, j++) { // Using j/l loop logic
            for (let l = 0; l < RES_YZ; l++) {
                const x = (i / (RES_X - 1)) * X_LEN;
                const y = ((j / (RES_YZ - 1)) * 2 - 1) * YZ_RANGE;
                const z = ((l / (RES_YZ - 1)) * 2 - 1) * YZ_RANGE;
                
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(x,y,z), 0.5, 0xffffff, 0.15, 0.08);
                scene.add(arrow);
                arrows.push({ obj: arrow, x, y, z });
            }
        }
    }

    // Restore the preferred HSL Plasma mapping
    function getPlasma(t) {
        return new THREE.Color().setHSL(0.7 - (t * 0.7), 1.0, 0.5);
    }

    function calculateBg(x, y, z, t) {
        const r2 = y*y + z*z;
        const env = Math.exp(-r2 / (w*w));
        const phase = (k * x) - t;
        let Bx, By, Bz;

        // Formula using momentum coupling p
        if (isPlus) {
            By = -k * h0 * p_val * env * Math.sin(phase);
            Bz = -k * h0 * p_val * env * Math.sin(phase);
            Bx = (2 * h0 / (w*w)) * env * Math.cos(phase) * (y * p_val + z * p_val);
        } else {
            By = -k * h0 * p_val * env * Math.sin(phase);
            Bz =  k * h0 * p_val * env * Math.sin(phase);
            Bx = (2 * h0 / (w*w)) * env * Math.cos(phase) * (y * p_val - z * p_val);
        }
        return new THREE.Vector3(Bx, By, Bz);
    }

    function update() {
        if (!paused) time += 0.03 * speed;

        arrows.forEach(a => {
            const Bg = calculateBg(a.x, a.y, a.z, time);
            const mag = Bg.length();
            
            // Visibility Threshold: if it's too weak (p is low), hide it
            const thresh = 0.05;
            if (mag < thresh) {
                a.obj.visible = false;
            } else {
                a.obj.visible = true;
                a.obj.setDirection(Bg.clone().normalize());
                
                // ABSOLUTE LENGTH: Strictly scales with p and h0
                const visualGain = 0.22; 
                const displayLen = mag * visualGain;
                a.obj.setLength(displayLen, displayLen * 0.3, 0.07);
                
                // Plasma Color normalization (assuming max flux around 3.5 for color scaling)
                const nMag = Math.min(mag / 3.5, 1.0);
                a.obj.setColor(getPlasma(nMag));
            }
        });
    }

    // --- UI Listeners ---
    document.getElementById('speed').oninput = e => {
        speed = parseFloat(e.target.value);
        document.getElementById('speed-val').innerText = speed.toFixed(1) + 'x';
    };
    document.getElementById('momentum').oninput = e => {
        p_val = parseFloat(e.target.value);
        document.getElementById('mom-val').innerText = p_val.toFixed(1);
    };
    document.getElementById('strain').oninput = e => {
        h0 = parseFloat(e.target.value);
        document.getElementById('strain-val').innerText = h0.toFixed(1);
    };
    document.getElementById('pause-btn').onclick = function() {
        paused = !paused;
        this.innerText = paused ? "Resume" : "Pause";
    };
    document.getElementById('btn-plus').onclick = function() {
        isPlus = true; this.classList.add('active');
        document.getElementById('btn-cross').classList.remove('active');
    };
    document.getElementById('btn-cross').onclick = function() {
        isPlus = false; this.classList.add('active');
        document.getElementById('btn-plus').classList.remove('active');
    };

    function animate() {
        requestAnimationFrame(animate);
        update();
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
