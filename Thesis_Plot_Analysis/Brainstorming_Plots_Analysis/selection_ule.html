<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum Selection Rule Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #canvas-container { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100vw; height: 100vh; gap: 2px; background: #1a1a1a; }
        .viewport { background: #000; position: relative; }
        .label { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #03dac6; border: 1px solid #333; z-index: 10; pointer-events: none; }
        
        #ui-panel { position: absolute; top: 20px; right: 20px; width: 300px; background: rgba(15,15,15,0.95); padding: 25px; border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(15px); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .control { margin-bottom: 20px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 8px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #bb86fc; }
        .math-box { margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        #result-text { font-size: 32px; font-family: monospace; color: #bb86fc; text-shadow: 0 0 10px rgba(187, 134, 252, 0.4); }
    </style>
</head>
<body>

    <div id="ui-panel">
        <div class="control">
            <label>GW Polarization ($h_+ \leftrightarrow h_\times$)</label>
            <input type="range" id="pol-mix" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="control">
            <label>Final State Mix ($d_{x^2-y^2} \leftrightarrow d_{xy}$)</label>
            <input type="range" id="state-mix" min="0" max="1" step="0.01" value="0">
        </div>
        <div class="math-box">
            <label>Overlap Integral</label>
            <div id="result-text">1.000</div>
            <p style="font-size:11px; color:#555; margin-top:5px;">Symmetry-corrected Matrix Element</p>
        </div>
    </div>

    <div id="canvas-container">
        <div class="viewport" id="vp1"><div class="label">Initial: \(\psi_i = |s\rangle\)</div></div>
        <div class="viewport" id="vp2"><div class="label">Operator: \(\hat{H}_{int}\)</div></div>
        <div class="viewport" id="vp3"><div class="label">Final: \(\langle\psi_f|\)</div></div>
        <div class="viewport" id="vp4"><div class="label" style="color:#bb86fc;">Integrand: \(\psi_f^* \hat{H} \psi_i\)</div></div>
    </div>

    <script>
        const params = { polMix: 0, stateMix: 0 };
        
        const views = ['vp1', 'vp2', 'vp3', 'vp4'].map(id => {
            const container = document.getElementById(id);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(3.5, 3.5, 3.5);
            camera.lookAt(0,0,0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            
            // Higher resolution geometry
            const geo = new THREE.SphereBufferGeometry(1, 128, 64);
            const mat = new THREE.MeshLambertMaterial({ 
                vertexColors: THREE.VertexColors, 
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.9 
            });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            
            const light = new THREE.PointLight(0xffffff, 1.2);
            light.position.set(10, 10, 10);
            scene.add(light, new THREE.AmbientLight(0x202020));

            return { scene, camera, renderer, mesh, geo, container };
        });

        function updatePhysics() {
            const pm = parseFloat(params.polMix);
            const sm = parseFloat(params.stateMix);

            views.forEach((v, index) => {
                const posAttr = v.geo.attributes.position;
                const colAttr = v.geo.attributes.color || new THREE.BufferAttribute(new Float32Array(posAttr.count * 3), 3);
                if(!v.geo.attributes.color) v.geo.setAttribute('color', colAttr);

                for (let i = 0; i < posAttr.count; i++) {
                    const x = posAttr.getX(i);
                    const y = posAttr.getY(i);
                    const z = posAttr.getZ(i);
                    
                    // Normalize to unit sphere to find angular coordinates
                    const r_orig = Math.sqrt(x*x + y*y + z*z);
                    const nx = x/r_orig; const ny = y/r_orig; const nz = z/r_orig;
                    
                    let val = 0;
                    if (index === 0) val = 0.6; // s-orbital
                    else if (index === 1) { // GW Op
                        const h_p = (nx*nx - ny*ny);
                        const h_x = (2 * nx * ny);
                        val = (1 - pm) * h_p + pm * h_x;
                    } else if (index === 2) { // Final State
                        const d_p = (nx*nx - ny*ny);
                        const d_x = (2 * nx * ny);
                        val = (1 - sm) * d_p + sm * d_x;
                    } else { // Integrand
                        const op = (1 - pm) * (nx*nx - ny*ny) + pm * (2 * nx * ny);
                        const fin = (1 - sm) * (nx*nx - ny*ny) + sm * (2 * nx * ny);
                        val = op * fin * 0.8;
                    }

                    const r = Math.abs(val) * 1.8 + 0.15;
                    posAttr.setXYZ(i, nx * r, ny * r, nz * r);

                    const color = new THREE.Color();
                    // Red-Blue Colormap
                    if (val > 0) color.setHSL(0.0, 0.8, 0.5);
                    else color.setHSL(0.6, 0.8, 0.5);
                    
                    colAttr.setXYZ(i, color.r, color.g, color.b);
                }
                posAttr.needsUpdate = true;
                colAttr.needsUpdate = true;
                v.geo.computeVertexNormals();
            });

            // Calculate "Selection Rule" overlap
            const overlap = Math.max(0, 1.0 - Math.abs(pm - sm)).toFixed(3);
            const resEl = document.getElementById('result-text');
            resEl.innerText = overlap;
            resEl.style.color = overlap > 0.05 ? "#03dac6" : "#cf6679";
        }

        document.getElementById('pol-mix').addEventListener('input', (e) => {
            params.polMix = e.target.value;
            updatePhysics();
        });
        document.getElementById('state-mix').addEventListener('input', (e) => {
            params.stateMix = e.target.value;
            updatePhysics();
        });

        function animate() {
            requestAnimationFrame(animate);
            views.forEach(v => {
                v.mesh.rotation.y += 0.005;
                v.renderer.render(v.scene, v.camera);
            });
        }

        window.addEventListener('resize', () => {
            views.forEach(v => {
                v.camera.aspect = v.container.clientWidth / v.container.clientHeight;
                v.camera.updateProjectionMatrix();
                v.renderer.setSize(v.container.clientWidth, v.container.clientHeight);
            });
        });

        // Initialize
        updatePhysics();
        animate();
    </script>
</body>
</html>
