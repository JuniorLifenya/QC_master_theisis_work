<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hydrogen 3d Orbital Deformation by Gravitational Wave</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            pointer-events: none; z-index: 10;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 12px 20px;
            border-radius: 8px; display: flex; gap: 20px; z-index: 10;
        }
        input { cursor: pointer; width: 200px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h2>Hydrogen 3d Orbital ($m = \pm 2$) under a Gravitational Wave</h2>
        <p>The kinetic strain operator $h_{ij}\hat{p}^i\hat{p}^j$ deforms the orbital, illustrating the quadrupole selection rule.</p>
    </div>
    <div id="controls">
        <div>
            <label>GW Phase (ωt):</label>
            <input type="range" id="phase" min="0" max="6.283" step="0.05" value="0">
            <span id="phase-val">0.00</span>
        </div>
        <div>
            <label>Strain h:</label>
            <input type="range" id="h-amp" min="0" max="0.8" step="0.01" value="0.4">
            <span id="h-val">0.40</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 3, 5);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Generate points for hydrogen 3d orbital (m=±2, real combination) ---
        // Use probability density proportional to (x² - y²)² * exp(-r/3) for 3d state.
        // We use rejection sampling.
        const N = 30000;
        const positions = [];
        const colors = [];

        function density(x, y, z) {
            const r = Math.sqrt(x*x + y*y + z*z);
            if (r === 0) return 0;
            const theta = Math.acos(z / r);
            const phi = Math.atan2(y, x);
            // 3d_{x²-y²} angular part ∝ sin²θ cos(2φ)
            const angular = Math.sin(theta)**2 * Math.cos(2*phi);
            const radial = Math.exp(-r / 3) * r**2; // approximate radial part
            return Math.abs(angular) * radial;
        }

        let i = 0;
        const maxDensity = 0.035; // tuned by trial
        while (i < N) {
            const x = (Math.random() - 0.5) * 8;
            const y = (Math.random() - 0.5) * 8;
            const z = (Math.random() - 0.5) * 8;
            const r = Math.sqrt(x*x + y*y + z*z);
            if (r > 6) continue;
            const d = density(x, y, z);
            if (Math.random() < d / maxDensity) {
                positions.push(x, y, z);
                // Colour based on sign of (x² - y²)
                const sign = Math.sign(x*x - y*y);
                const rCol = sign > 0 ? 0.9 : 0.2;
                const gCol = sign > 0 ? 0.2 : 0.6;
                const bCol = sign > 0 ? 0.2 : 0.9;
                colors.push(rCol, gCol, bCol);
                i++;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
        const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const pointsMesh = new THREE.Points(geometry, material);
        scene.add(pointsMesh);

        // --- Deformation function (plus polarisation) ---
        let phase = 0;
        let h_amp = 0.4;
        const originalPositions = positions.slice(); // copy

        function updateDeformation() {
            const cosPhase = Math.cos(phase);
            const h = h_amp;
            const posAttr = geometry.attributes.position.array;
            for (let i = 0; i < N; i++) {
                const x0 = originalPositions[i*3];
                const y0 = originalPositions[i*3+1];
                const z0 = originalPositions[i*3+2];
                const dx = 0.5 * h * cosPhase * x0;
                const dy = -0.5 * h * cosPhase * y0;
                const dz = 0;
                posAttr[i*3] = x0 + dx;
                posAttr[i*3+1] = y0 + dy;
                posAttr[i*3+2] = z0 + dz;
            }
            geometry.attributes.position.needsUpdate = true;
        }

        // --- UI ---
        const phaseSlider = document.getElementById('phase');
        const phaseVal = document.getElementById('phase-val');
        const hSlider = document.getElementById('h-amp');
        const hVal = document.getElementById('h-val');

        phaseSlider.addEventListener('input', (e) => {
            phase = parseFloat(e.target.value);
            phaseVal.innerText = phase.toFixed(2);
            updateDeformation();
        });
        hSlider.addEventListener('input', (e) => {
            h_amp = parseFloat(e.target.value);
            hVal.innerText = h_amp.toFixed(2);
            updateDeformation();
        });

        // --- Animation (rotate slowly) ---
        let angle = 0;
        function animate() {
            requestAnimationFrame(animate);
            angle += 0.002;
            pointsMesh.rotation.y = angle;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
