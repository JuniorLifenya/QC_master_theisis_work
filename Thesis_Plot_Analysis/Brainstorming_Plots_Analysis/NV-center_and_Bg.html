<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravitomagnetic Field B̂_g — Non-Normalized</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap');
        * { margin:0; padding:0; box-sizing:border-box }
        body { background:#050508; color:#e0dcd6; font-family:'JetBrains Mono',monospace; overflow:hidden }
        #title-panel { position:absolute; top:24px; left:24px; background:rgba(8,8,16,0.9);
            border:1px solid rgba(200,100,255,0.25); border-radius:3px; padding:20px 24px;
            max-width:350px; backdrop-filter:blur(14px); z-index:10 }
        #title-panel h1 { font-family:'Crimson Pro',serif; font-size:17px; font-weight:600; color:#c864ff; margin-bottom:6px }
        #title-panel p { font-size:10.5px; color:#8880a0; line-height:1.7 }
        #controls { position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
            background:rgba(8,8,16,0.92); border:1px solid rgba(200,100,255,0.2);
            border-radius:3px; padding:14px 28px; backdrop-filter:blur(12px);
            display:flex; gap:24px; align-items:center; z-index:10 }
        .ctrl { display:flex; flex-direction:column; gap:5px; align-items:center }
        .ctrl label { font-size:10px; color:#7060a0; text-transform:uppercase }
        .val { font-size:11px; color:#c864ff; font-weight:600 }
        input[type=range] { -webkit-appearance:none; width:110px; height:3px; background:rgba(200,100,255,0.2); cursor:pointer; outline:none }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#c864ff; border-radius:50% }
        button { background:rgba(200,100,255,0.1); border:1px solid rgba(200,100,255,0.3);
            color:#c864ff; padding:8px 16px; border-radius:2px; cursor:pointer; font-size:10px; text-transform:uppercase }
        button.active { background:rgba(200,100,255,0.3); border-color:#c864ff }
    </style>
</head>
<body>

<div id="title-panel">
    <h1>B̂<sub>g</sub>: Absolute Flux Map</h1>
    <p><b>Non-Normalized:</b> Arrow length is now directly proportional to $p \cdot h_0$. The center contains an <b>NV-Center Lattice</b> (white spins) reacting to the field torque.</p>
</div>

<div id="controls">
    <div class="ctrl">
        <label>Momentum (p)</label>
        <input type="range" id="momentum" min="0" max="10" step="0.1" value="2.5">
        <div class="val" id="mom-val">2.5</div>
    </div>
    <div class="ctrl">
        <label>Strain (h₀)</label>
        <input type="range" id="strain" min="0" max="2" step="0.1" value="1.0">
        <div class="val" id="strain-val">1.0</div>
    </div>
    <div class="ctrl">
        <label>Polarization</label>
        <div style="display:flex; gap:5px;">
            <button id="btn-plus" class="active">h₊</button>
            <button id="btn-cross">h×</button>
        </div>
    </div>
    <button id="pause-btn">Pause</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(18, 12, 18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(6, 0, 0);
    controls.enableDamping = true;

    // --- Params ---
    let time = 0, paused = false, p_val = 2.5, h0 = 1.0, isPlus = true;
    const w = 2.5, k = (2 * Math.PI) / 6.0;

    // --- Background Field Arrows ---
    const fieldArrows = [];
    const RES_X = 14, RES_YZ = 8;
    for (let i = 0; i < RES_X; i++) {
        for (let j = 0; j < RES_YZ; j++) {
            for (let l = 0; l < RES_YZ; l++) {
                const x = (i / (RES_X - 1)) * 14;
                const y = ((j / (RES_YZ - 1)) * 2 - 1) * 4;
                const z = ((l / (RES_YZ - 1)) * 2 - 1) * 4;
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(x,y,z), 0.1, 0x4444ff);
                scene.add(arrow);
                fieldArrows.push({ obj: arrow, x, y, z });
            }
        }
    }

    // --- NV Center Lattice (The Sensor) ---
    const nvSpins = [];
    const NV_RES = 4;
    for(let i=0; i<NV_RES; i++) {
        for(let j=0; j<NV_RES; j++) {
            for(let l=0; l<NV_RES; l++) {
                const x = 6 + (i-NV_RES/2)*0.8;
                const y = (j-NV_RES/2)*0.8;
                const z = (l-NV_RES/2)*0.8;
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(x,y,z), 0.6, 0xffffff);
                scene.add(arrow);
                nvSpins.push({ obj: arrow, x, y, z, spin: new THREE.Vector3(0,1,0) });
            }
        }
    }

    function calculateBg(x, y, z, t) {
        const r2 = y*y + z*z;
        const env = Math.exp(-r2 / (w*w));
        const phase = (k * x) - t;
        let Bx, By, Bz;

        if (isPlus) {
            By = -k * h0 * p_val * env * Math.sin(phase);
            Bz = -k * h0 * p_val * env * Math.sin(phase);
            Bx = (2 * h0 / (w*w)) * env * Math.cos(phase) * (y * p_val + z * p_val);
        } else {
            By = -k * h0 * p_val * env * Math.sin(phase);
            Bz =  k * h0 * p_val * env * Math.sin(phase);
            Bx = (2 * h0 / (w*w)) * env * Math.cos(phase) * (y * p_val - z * p_val);
        }
        return new THREE.Vector3(Bx, By, Bz);
    }

    function update() {
        if (!paused) time += 0.04;

        // Update Field - ABSOLUTE SCALING
        fieldArrows.forEach(a => {
            const Bg = calculateBg(a.x, a.y, a.z, time);
            const mag = Bg.length();
            
            // Physical visibility: if it's too small, don't show it, but no "max" normalization
            a.obj.visible = mag > 0.05; 
            if (a.obj.visible) {
                a.obj.setDirection(Bg.clone().normalize());
                // Length is purely a function of magnitude
                const displayLen = mag * 0.25; 
                a.obj.setLength(displayLen, displayLen * 0.2, 0.05);
                a.obj.setColor(new THREE.Color().setHSL(0.6 - Math.min(mag*0.1, 0.6), 1, 0.5));
            }
        });

        // Update NV Spins - Precession Hit
        nvSpins.forEach(s => {
            const localB = calculateBg(s.x, s.y, s.z, time);
            if (localB.length() > 0.01) {
                // Torque: dS = S x B
                const torque = new THREE.Vector3().crossVectors(s.spin, localB);
                s.spin.addScaledVector(torque, 0.1); 
                s.spin.normalize();
            }
            s.obj.setDirection(s.spin);
            // Flash white when "hit" by strong field
            const hit = Math.min(localB.length()*0.5, 1);
            s.obj.setColor(new THREE.Color(1, 1-hit, 1));
        });
    }

    document.getElementById('momentum').oninput = e => {
        p_val = parseFloat(e.target.value);
        document.getElementById('mom-val').innerText = p_val.toFixed(1);
    };
    document.getElementById('strain').oninput = e => {
        h0 = parseFloat(e.target.value);
        document.getElementById('strain-val').innerText = h0.toFixed(1);
    };
    document.getElementById('pause-btn').onclick = function() {
        paused = !paused;
        this.innerText = paused ? "Resume" : "Pause";
    };
    document.getElementById('btn-plus').onclick = function() {
        isPlus = true; this.classList.add('active');
        document.getElementById('btn-cross').classList.remove('active');
    };
    document.getElementById('btn-cross').onclick = function() {
        isPlus = false; this.classList.add('active');
        document.getElementById('btn-plus').classList.remove('active');
    };

    function animate() {
        requestAnimationFrame(animate);
        update();
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
