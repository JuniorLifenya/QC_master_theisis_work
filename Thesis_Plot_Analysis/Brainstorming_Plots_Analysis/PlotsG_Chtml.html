<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lense-Thirring Bloch Sphere</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #f8f9fa; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; gap: 20px; align-items: center;
        }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 12px; font-weight: bold; color: #333; }
        input[type="range"] { cursor: pointer; }
        button {
            padding: 8px 16px; border: none; border-radius: 5px;
            background: #2171B5; color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #1a5a90; }
        #legend {
            position: absolute; top: 20px; left: 20px;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 14px; }
        .color-box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="legend">
        <strong>Precession Trajectories</strong><br><br>
        <div class="legend-item"><div class="color-box" style="background:#2171B5;"></div> Pure Larmor (Flat)</div>
        <div class="legend-item"><div class="color-box" style="background:#E31A1C;"></div> Lense-Thirring (Wobble)</div>
    </div>

    <div id="ui-container">
        <button id="play-pause">Pause</button>
        <button id="reset">Reset</button>
        <div class="control-group">
            <label for="coupling">Coupling Strength (κ): <span id="coupling-val">0.2</span></label>
            <input type="range" id="coupling" min="0" max="1" step="0.05" value="0.2">
        </div>
        <div class="control-group">
            <label for="speed">Animation Speed: <span id="speed-val">1.0</span>x</label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1.0">
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.5, 2.5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;

        // --- 2. Bloch Sphere & Axes ---
        const origin = new THREE.Vector3(0, 0, 0);
        
        // Wireframe Sphere
        const sphereGeo = new THREE.SphereGeometry(1, 32, 16);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0xcccccc, wireframe: true, transparent: true, opacity: 0.3 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);

        // XYZ Axes (Black)
        scene.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, 1.3, 0x000000, 0.05, 0.05));
        scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0), origin, 1.3, 0x000000, 0.05, 0.05));
        scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), origin, 1.3, 0x000000, 0.05, 0.05));

        // --- 3. Spin Vectors & Trails ---
        const colorLarmor = 0x2171B5; // Blue
        const colorTotal = 0xE31A1C;  // Red
        
        const vecLarmor = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, 1, colorLarmor, 0.1, 0.1);
        const vecTotal = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, 1, colorTotal, 0.1, 0.1);
        scene.add(vecLarmor);
        scene.add(vecTotal);

        // Trail Setup (BufferGeometry for dynamic lines)
        const MAX_POINTS = 2000;
        
        function createTrail(color) {
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(MAX_POINTS * 3);
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setDrawRange(0, 0);
            const mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            return new THREE.Line(geo, mat);
        }

        const trailLarmor = createTrail(colorLarmor);
        const trailTotal = createTrail(colorTotal);
        scene.add(trailLarmor);
        scene.add(trailTotal);

        // --- 4. Physics & Animation Logic ---
        let isPlaying = true;
        let time = 0;
        let pointCount = 0;
        
        // Physics Parameters
        let omega_L = 2.0; 
        let coupling = parseFloat(document.getElementById('coupling').value);
        let speed = parseFloat(document.getElementById('speed').value);
        let omega_LT = coupling * omega_L;

        const initialState = new THREE.Vector3(1, 0, 0); // Start at X-axis

        function updatePhysics() {
            if (!isPlaying) return;
            
            time += 0.01 * speed;
            
            // Larmor Rotation (strictly around Z)
            const axisLarmor = new THREE.Vector3(0, 0, 1).normalize();
            const currentLarmor = initialState.clone().applyAxisAngle(axisLarmor, omega_L * time);
            vecLarmor.setDirection(currentLarmor);

            // Total Rotation (Lense-Thirring wobble around tilted axis)
            const axisTotal = new THREE.Vector3(omega_LT, 0, omega_L).normalize();
            // True frequency is magnitude of the combined vector
            const effectiveOmega = Math.sqrt(omega_L*omega_L + omega_LT*omega_LT);
            const currentTotal = initialState.clone().applyAxisAngle(axisTotal, effectiveOmega * time);
            vecTotal.setDirection(currentTotal);

            // Update Trails
            if (pointCount < MAX_POINTS) {
                const posL = trailLarmor.geometry.attributes.position.array;
                const posT = trailTotal.geometry.attributes.position.array;

                posL[pointCount * 3] = currentLarmor.x;
                posL[pointCount * 3 + 1] = currentLarmor.y;
                posL[pointCount * 3 + 2] = currentLarmor.z;

                posT[pointCount * 3] = currentTotal.x;
                posT[pointCount * 3 + 1] = currentTotal.y;
                posT[pointCount * 3 + 2] = currentTotal.z;

                pointCount++;
                
                trailLarmor.geometry.setDrawRange(0, pointCount);
                trailTotal.geometry.setDrawRange(0, pointCount);
                
                trailLarmor.geometry.attributes.position.needsUpdate = true;
                trailTotal.geometry.attributes.position.needsUpdate = true;
            }
        }

        function resetSimulation() {
            time = 0;
            pointCount = 0;
            trailLarmor.geometry.setDrawRange(0, 0);
            trailTotal.geometry.setDrawRange(0, 0);
            vecLarmor.setDirection(initialState);
            vecTotal.setDirection(initialState);
        }

        // --- 5. UI Event Listeners ---
        document.getElementById('play-pause').addEventListener('click', (e) => {
            isPlaying = !isPlaying;
            e.target.innerText = isPlaying ? "Pause" : "Play";
        });

        document.getElementById('reset').addEventListener('click', resetSimulation);

        document.getElementById('coupling').addEventListener('input', (e) => {
            coupling = parseFloat(e.target.value);
            omega_LT = coupling * omega_L;
            document.getElementById('coupling-val').innerText = coupling.toFixed(2);
            resetSimulation();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speed-val').innerText = speed.toFixed(1);
        });

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 6. Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
